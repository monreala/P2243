# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Set up Chrome
      uses: browser-actions/setup-chrome@v1
      with:
        chrome-version: 'stable'
    - name: Install Xvfb and ffmpeg
      run: sudo apt-get update && sudo apt-get install -y xvfb ffmpeg
    - name: Start virtual display
      run: |
        Xvfb :99 -screen 0 1920x1080x24 &
        echo "DISPLAY=:99" >> $GITHUB_ENV
    - name: Start video recording
      run: |
        ffmpeg -y -f x11grab -video_size 1920x1080 -i :99 -codec:v libx264 -r 15 /tmp/test-video.mp4 &
        echo $! > /tmp/ffmpeg.pid
    - name: Run tests
      run: mvn -B test --file pom.xml
      env:
        DISPLAY: ':99'
    - name: Stop video recording
      if: always()
      run: |
        kill $(cat /tmp/ffmpeg.pid) || true
        sleep 5
    - name: Upload test video
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-video
        path: /tmp/test-video.mp4
        retention-days: 7

